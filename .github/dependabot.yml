version: 2
updates:
  # NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"

  # UI Project NPM dependencies
  - package-ecosystem: "npm"
    directory: "/src/ui/InventoryAlert.UI"
    schedule:
      interval: "weekly"

  # Wiki Project NPM dependencies
  - package-ecosystem: "npm"
    directory: "/src/ui/InventoryAlert.Wiki"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
